<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Manzil Recipe Vault</title>
    <meta
      name="description"
      content="Collect, share, and rediscover family recipes. Manzil Recipe Vault keeps the dishes you love in one place."
    />
    <meta name="theme-color" content="#fcc9c7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1f1a1d" media="(prefers-color-scheme: dark)" />

    <link rel="icon" type="image/png" href="/logo2.png" />
    <link rel="apple-touch-icon" href="/logo2.png" />

    <!-- Open Graph / social sharing. Recipe pages override the title and
         description at runtime; these are the defaults for the site itself. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Manzil Recipe Vault" />
    <meta property="og:title" content="Manzil Recipe Vault" />
    <meta
      property="og:description"
      content="Collect, share, and rediscover family recipes."
    />
    <meta property="og:image" content="/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!--
      Font Awesome 4.7 used to be pulled from a CDN here: a render-blocking
      third-party request, and a supply-chain dependency for twenty small
      glyphs. Icons are now inline SVG in src/components/Icon.tsx.
    -->

    <!--
      Inter, discovered in the HTML rather than behind an @import in the app
      CSS. preconnect opens the connection to both hosts (the CSS and the font
      files are served from different origins) while the HTML is still being
      parsed, and `media="print"` + the onload swap keeps the stylesheet off
      the critical path, so text paints in the fallback immediately instead of
      waiting on a third-party round trip. `display=swap` in the URL means the
      swap-in never blanks the text.
      The <noscript> copy keeps the font for readers without JavaScript, who
      would otherwise never run the onload handler.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <script>
      // Applies the saved theme before first paint. Without this the page
      // renders light and then flips, which is worse than either theme.
      (function () {
        try {
          var stored = localStorage.getItem('manzil-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          /* localStorage unavailable (private mode) — fall back to light. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Manzil Recipe Vault needs JavaScript enabled to run.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
